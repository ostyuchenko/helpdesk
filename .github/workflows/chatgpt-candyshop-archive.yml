name: ChatGPT Candyshop docs archive

on:
  push:
    paths:
      - '.github/scripts/chatgpt_archive_candyshop_20260624.py'
      - '.github/workflows/chatgpt-candyshop-archive.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  archive:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install crawler dependencies
        run: python -m pip install --upgrade requests beautifulsoup4

      - name: Crawl and archive documentation
        run: python .github/scripts/chatgpt_archive_candyshop_20260624.py

      - name: Show archive summary
        if: always()
        run: |
          ls -lah candyshop-helpdesk-local-copy.zip || true
          python - <<'PY'
          import json, pathlib
          p = pathlib.Path('candyshop-helpdesk-local-copy/manifest.json')
          if p.exists():
              m = json.loads(p.read_text(encoding='utf-8'))
              print(json.dumps({
                  'pages': m.get('page_count'),
                  'assets': m.get('asset_count'),
                  'errors': m.get('error_count'),
                  'generated_at': m.get('generated_at')
              }, ensure_ascii=False, indent=2))
          PY

      - name: Upload local documentation ZIP
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: candyshop-helpdesk-local-copy
          path: |
            candyshop-helpdesk-local-copy.zip
            candyshop-helpdesk-local-copy/manifest.json
            candyshop-helpdesk-local-copy/errors.log
          if-no-files-found: error
          retention-days: 7
