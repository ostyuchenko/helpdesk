# PR run marker: ChatGPT Candyshop docs archive fast pass 2026-06-24
name: ChatGPT Candyshop docs archive

on:
  push:
    paths:
      - '.github/scripts/chatgpt_archive_candyshop_20260624.py'
      - '.github/workflows/chatgpt-candyshop-archive.yml'
  pull_request:
    paths:
      - '.github/scripts/chatgpt_archive_candyshop_20260624.py'
      - '.github/workflows/chatgpt-candyshop-archive.yml'
      - '.github/scripts/chatgpt_candyshop_trigger.txt'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  archive:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install crawler dependencies
        run: python -m pip install --upgrade requests beautifulsoup4

      - name: Patch crawler for fast archival run
        run: |
          python - <<'PY'
          from pathlib import Path
          p = Path('.github/scripts/chatgpt_archive_candyshop_20260624.py')
          s = p.read_text(encoding='utf-8')
          s = s.replace('TIMEOUT = (20, 90)', 'TIMEOUT = (8, 20)')
          s = s.replace('REQUEST_DELAY_SECONDS = 0.12', 'REQUEST_DELAY_SECONDS = 0.03')
          s = s.replace('MAX_ASSET_BYTES = 150 * 1024 * 1024', 'MAX_ASSET_BYTES = 50 * 1024 * 1024')
          s = s.replace('"script": ("src",), ', '')
          s = s.replace('"iframe": ("src",), ', '')
          old = 'if u and (rels & {"stylesheet", "icon", "preload", "prefetch", "manifest", "apple-touch-icon"} or PurePosixPath(urlsplit(u).path).suffix.lower() in FILES): tag["href"] = rel(local, add_asset(u))'
          new = 'if u and ((urlsplit(u).hostname or "").lower() == HOST) and (rels & {"stylesheet", "icon", "preload", "prefetch", "manifest", "apple-touch-icon"} or PurePosixPath(urlsplit(u).path).suffix.lower() in FILES): tag["href"] = rel(local, add_asset(u))'
          s = s.replace(old, new)
          p.write_text(s, encoding='utf-8')
          print('Patched crawler for fast run')
          PY

      - name: Crawl and archive documentation
        run: python .github/scripts/chatgpt_archive_candyshop_20260624.py

      - name: Show archive summary
        if: always()
        run: |
          ls -lah candyshop-helpdesk-local-copy.zip || true
          python - <<'PY'
          import json, pathlib
          p = pathlib.Path('candyshop-helpdesk-local-copy/manifest.json')
          if p.exists():
              m = json.loads(p.read_text(encoding='utf-8'))
              print(json.dumps({
                  'pages': m.get('page_count'),
                  'assets': m.get('asset_count'),
                  'errors': m.get('error_count'),
                  'generated_at': m.get('generated_at')
              }, ensure_ascii=False, indent=2))
          PY

      - name: Upload local documentation ZIP
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: candyshop-helpdesk-local-copy
          path: |
            candyshop-helpdesk-local-copy.zip
            candyshop-helpdesk-local-copy/manifest.json
            candyshop-helpdesk-local-copy/errors.log
          if-no-files-found: error
          retention-days: 7
